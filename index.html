<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título da aba da página -->
    <title>Meus sites favoritos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        img {
            width: 300px;
            height: auto;
            border: 1px solid #ccc;
            border-radius: 8px;
            display: block;
            margin: 10px auto;
        }
        section {
            margin-bottom: 40px;
            padding: 20px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

    <!-- Título principal do corpo da página -->
    <h1>Meus sites favoritos: Isolina Sena</h1>

    <!-- Início da lista de sites -->

    <!-- Site 1 -->
    <section>
        <h1>YouTube</h1> <!-- Nome do site -->
        <img src="youtube.png" alt="Logo do YouTube"> <!-- Imagem local -->
        <a href="https://www.youtube.com" target="_blank">Visitar YouTube</a> <!-- https://www.youtube.com-->
    </section>

    <!-- Site 2 -->
    <section>
        <h1>GitHub</h1>
        <img src="github.png" alt="Logo do GitHub">
        <a href="https://www.github.com" target="_blank">Visitar GitHub</a> <!-- https://www.github.com-->
    </section>

    <!-- Site 3 -->
    <section>
        <h1>Canva</h1>
        <img src="canva.png" alt="Logo do Canva">
        <a href="https://www.canva.com" target="_blank">Visitar Canva</a> <!--https://www.canva.com-->
    </section>

    <!-- Site 4 -->
    <section>
        <h1>Python Org</h1>
        <img src="python.png" alt="Logo do Python">
        <a href="https://www.python.org" target="_blank">Visitar Python.org</a> <!--https://www.python.org-->
    </section>

    <!-- Site 5 -->
    <section>
        <h1>Stack Overflow</h1>
        <img src="stackoverflow.png" alt="Logo do Stack Overflow">
        <a href="https://stackoverflow.com" target="_blank">Visitar Stack Overflow</a> <!--https://stackoverflow.com-->
    </section>

</body>
</html>
